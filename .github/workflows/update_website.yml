name: Step 5 - Update Website

on:
  repository_dispatch:
    types: [trigger-step5]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests pillow

      - name: Run Update Script
        run: |
          python scripts/run_website_updates.py
